<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  html, body { overflow-x: hidden; width: 100%; min-width: 100%; height: 100%; min-height: 100dvh; margin: 0; padding: 0; }
  body { display: flex; flex-direction: column; }
  @supports not (height: 100dvh) {
    html, body, #root, .wrap { min-height: 100vh; }
  }
</style>

<title>Emergency Medical Info</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#f1f5f9;color:#0f172a;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Oxygen,Ubuntu,Cantarell,Arial,sans-serif;width:100%;min-width:100%;min-height:100vh;-webkit-font-smoothing:antialiased}
  a{color:inherit}
  .emg-header{background:linear-gradient(135deg,#dc2626,#7f1d1d);color:#fff;padding:18px 22px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 4px 12px rgba(0,0,0,.15);position:sticky;top:0;z-index:5;gap:12px;flex-wrap:wrap}
  .emg-header .lbl{font-size:11px;letter-spacing:2.5px;opacity:.9;font-weight:700;text-transform:uppercase}
  .emg-header .nm{font-size:22px;font-weight:800;margin-top:4px;display:flex;align-items:center;gap:8px}
  .btn{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.35);padding:8px 14px;border-radius:8px;cursor:pointer;font-weight:600;font-size:14px}
  .btn:hover{background:rgba(255,255,255,.25)}
  #root{width:100%;min-width:100%;min-height:100dvh;flex:1 1 auto;display:flex;flex-direction:column}.wrap{width:100%;max-width:none;margin:0;padding:20px clamp(10px,3vw,32px);min-height:100dvh;flex:1 1 auto;display:flex;flex-direction:column}
  .card{background:#fff;border-radius:14px;padding:20px;box-shadow:0 4px 12px rgba(0,0,0,.05);margin-top:14px;border:1px solid #eef2f7}
  .card h2{font-size:14px;color:#0f172a;font-weight:800;text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid #f1f5f9;display:flex;align-items:center;gap:10px}
  .card h2 .ico{font-size:18px}
  .kv{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
  .kv .item{background:#f8fafc;border-radius:10px;padding:10px 12px;border-left:3px solid #cbd5e1}
  .kv .item .k{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#64748b;font-weight:700}
  .kv .item .v{font-size:15px;font-weight:700;color:#0f172a;margin-top:3px;word-break:break-word}
  .pills{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .pill{padding:12px 14px;border-radius:10px;border:1px solid #eef2f7}
  .pill .k{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#64748b;font-weight:700}
  .pill .v{font-size:16px;font-weight:800;color:#0f172a;margin-top:3px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:8px}
  @media (max-width:900px){
    .wrap{margin:0;padding:12px 10px;width:100%;max-width:none}
    .emg-header{padding:14px 14px}
    .emg-header .nm{font-size:18px}
    .emg-header .nm{font-size:16px}
    .card{padding:14px;border-radius:12px}
    .kv{grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px}
    .avatar{width:64px;height:64px;font-size:26px;border-width:2px}
    .row > div[style*="flex:1"] > div:first-child{font-size:20px !important}
    .telbtn{font-size:15px;padding:9px 14px;width:100%;justify-content:center}
    .btn{padding:7px 10px;font-size:13px}
    .stats{grid-template-columns:repeat(2,1fr)}
  }
  @media (max-width:720px){
    .grid2,.pills{grid-template-columns:1fr}
    .kv{grid-template-columns:1fr 1fr}
    .emg-header{flex-direction:column;align-items:stretch;text-align:center}
    .emg-header .no-print{justify-content:center}
    .emg-header .nm{justify-content:center}
  }
  @media (max-width:420px){
    .kv{grid-template-columns:1fr}
    .stats{grid-template-columns:1fr 1fr}
    .card h2{font-size:13px}
    .pill .v{font-size:15px}
  }
  ul{padding-left:20px;color:#334155;line-height:1.65}
  .muted{color:#94a3b8;font-style:italic}
  .avatar{width:88px;height:88px;border-radius:50%;background:#fee2e2;color:#b91c1c;display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:800;flex-shrink:0;border:3px solid #fecaca}
  .row{display:flex;gap:18px;align-items:center;flex-wrap:wrap}
  .foot{margin:18px 0 30px;text-align:center;color:#64748b;font-size:12px;line-height:1.7}
  .sub{color:#64748b}
  .last{background:#f8fafc;padding:14px;border-radius:10px;border:1px solid #e2e8f0;height:100%}
  .last .hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;color:#0f172a;font-weight:800;font-size:14px;flex-wrap:wrap;gap:6px}
  .last .body{color:#334155;font-size:14px;line-height:1.75}
  .last .body div{margin-bottom:3px}
  .none{background:#f8fafc;padding:14px;border-radius:10px;border:1px dashed #cbd5e1;color:#94a3b8;text-align:center}
  .telbtn{display:inline-flex;align-items:center;gap:8px;background:#dc2626;color:#fff;font-weight:800;text-decoration:none;font-size:16px;padding:10px 18px;border-radius:10px;margin-top:10px;box-shadow:0 4px 10px rgba(220,38,38,.25)}
  .telbtn:hover{background:#b91c1c}
  .list-block{margin-top:10px}
  .list-block .title{font-weight:800;color:#0f172a;margin-bottom:6px;font-size:13px;text-transform:uppercase;letter-spacing:.4px}
  .alert-list li{color:#991b1b;font-weight:600}
  .chronic-list li{color:#92400e;font-weight:600}
  .med-list li{color:#1e40af;font-weight:600}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-top:14px;padding-top:14px;border-top:1px dashed #e2e8f0}
  .stat{text-align:center;padding:8px 6px}
  .stat .n{font-size:20px;font-weight:800;color:#0f172a}
  .stat .l{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#64748b;font-weight:700;margin-top:2px}
  .live-badge{display:inline-flex;align-items:center;gap:6px;background:#dcfce7;color:#166534;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:800;letter-spacing:.5px;text-transform:uppercase}
  .live-dot{width:8px;height:8px;border-radius:50%;background:#16a34a;animation:pulse 1.5s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  /* Desktop safety: keep header aligned with content, cap grid columns */
  @media (min-width:1024px){
    .emg-header{padding:20px clamp(22px,3vw,40px)}
    .kv{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
    .stats{grid-template-columns:repeat(auto-fit,minmax(140px,1fr))}
    .telbtn{max-width:320px}
    .card{padding:22px 24px}
  }

  /* Overflow safety net */
  .card, .card *, .emg-header, .emg-header * { min-width: 0; }
  .card, .last .body, .pill .v, .kv .item .v, .emg-header .nm,
  ul li, .telbtn, a, h1, h2, p, div, span { overflow-wrap: anywhere; word-break: break-word; }
  .telbtn { max-width: 100%; white-space: normal; text-align: center; }
  .emg-header { max-width: 100%; }
  .emg-header > div:first-child { flex: 1 1 0; min-width: 0; max-width: 100%; }
  .emg-header .lbl, .emg-header .nm { max-width: 100%; }
  .emg-header .no-print { min-width: 0; max-width: 100%; flex-wrap: wrap; }
  .emg-header .no-print .btn { flex: 0 1 auto; min-width: 0; max-width: 100%; white-space: normal; }
  .row, .row > div { min-width: 0; max-width: 100%; }
  .row > div[style*="min-width"] { min-width: 0 !important; max-width: 100% !important; flex-basis: 0; }
  img, svg { max-width: 100%; height: auto; }
  table { max-width: 100%; }

  .wrap{ justify-content:flex-start; padding-top:max(20px,env(safe-area-inset-top)); padding-bottom:max(20px,env(safe-area-inset-bottom)); }
  html,body{ overflow-y:auto; }
  .wrap, .wrap *{ max-width:100%; overflow-wrap:anywhere; word-break:break-word; }
  @media (max-width:380px){
    .emg-header{padding:12px 12px;}
    .emg-header .nm{font-size:15px;}
    .emg-header .lbl{font-size:10px;letter-spacing:1.8px;}
    .card{padding:12px;}
    .card h2{font-size:12px;}
    .pill .v{font-size:14px;}
    .kv .item .v{font-size:14px;}
    .telbtn{font-size:14px;padding:9px 12px;}
    .avatar{width:56px;height:56px;font-size:22px;}
  }
    @media print{ .no-print{display:none !important} body{background:#fff} .emg-header{position:static} .card{box-shadow:none;border:1px solid #e2e8f0;break-inside:avoid} .telbtn{background:#fff;color:#dc2626;border:1px solid #dc2626;box-shadow:none} }
</style>

<body>
<div id="root"><div class="wrap"><div class="card" style="text-align:center;padding:40px;color:#64748b;margin:auto;max-width:520px;width:100%;">Loading latest emergency info…</div></div></div>
<script>
/* =====================================================================
   Firebase configuration
   The Web API key is a public identifier (safe to embed); real access is
   controlled by your Realtime Database security rules.
   ===================================================================== */
var firebaseConfig = {
  apiKey: "AIzaSyCmxCr5-jG9MPWRQea5TOzWlUk8pgRMjrs",
  authDomain: "ymco-medical-records.firebaseapp.com",
  databaseURL: "https://ymco-medical-records-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ymco-medical-records",
  storageBucket: "ymco-medical-records.firebasestorage.app",
  messagingSenderId: "50957375156",
  appId: "1:50957375156:web:5797087c6514bd796269e1",
  measurementId: "G-C335G5EL6N"
};
try { firebase.initializeApp(firebaseConfig); } catch(e){ /* already init'd */ }

(function(){
  var esc = function(s){ return String(s==null?'':s).replace(/[&<>"']/g, function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]);}); };
  var fmtDT = function(d){ try{ if(!d) return ''; return new Date(d).toLocaleString('en-GB'); } catch(_){ return String(d||''); } };
  var fmtD  = function(d){ try{ if(!d) return ''; return new Date(d).toLocaleDateString('en-GB'); } catch(_){ return String(d||''); } };

  function fromB64Url(str){
    try {
      var b64 = str.replace(/-/g,'+').replace(/_/g,'/') + '==='.slice((str.length + 3) % 4);
      return JSON.parse(decodeURIComponent(escape(atob(b64))));
    } catch(e){ return null; }
  }

  function kvItem(label, val){
    return '<div class="item"><div class="k">'+esc(label)+'</div><div class="v">'+(val ? esc(val) : '<span class="muted">—</span>')+'</div></div>';
  }
  function pill(label, val, color){
    return '<div class="pill" style="background:'+(color||'#f8fafc')+';"><div class="k">'+esc(label)+'</div><div class="v">'+esc(val||'—')+'</div></div>';
  }
  function listBlock(title, items, cssClass){
    return '<div class="list-block"><div class="title">'+esc(title)+'</div>'
      + ((items && items.length)
          ? '<ul class="'+(cssClass||'')+'">' + items.map(function(x){ return '<li>'+esc(x)+'</li>'; }).join('') + '</ul>'
          : '<div class="muted">None recorded</div>')
      + '</div>';
  }
  var FIELD_LABELS = {
    result:'Result', status:'Status', notes:'Notes', note:'Notes', remarks:'Remarks',
    complaint:'Complaint', symptoms:'Symptoms', diagnosis:'Diagnosis', treatment:'Treatment',
    medication:'Medication', medications:'Medications', prescription:'Prescription',
    doctor:'Doctor', physician:'Physician', clinic:'Clinic', hospital:'Hospital',
    type:'Type', body:'Body Part', bodyPart:'Body Part', part:'Body Part',
    desc:'Description', description:'Description', details:'Details',
    severity:'Severity', cause:'Cause', location:'Location', site:'Site',
    outcome:'Outcome', followup:'Follow-up', follow_up:'Follow-up',
    reportId:'Report ID', id:'Report ID', ref:'Reference', refNo:'Reference',
    bp:'Blood Pressure', bs:'Blood Sugar', hr:'Heart Rate', temp:'Temperature', weight:'Weight', height:'Height'
  };
  function humanize(k){ return FIELD_LABELS[k] || k.replace(/[_-]+/g,' ').replace(/([a-z])([A-Z])/g,'$1 $2').replace(/^./, function(c){return c.toUpperCase();}); }
  function fmtVal(v){
    if (v == null || v === '') return '';
    if (Array.isArray(v)) return v.map(function(x){ return typeof x==='object' ? JSON.stringify(x) : String(x); }).join(', ');
    if (typeof v === 'object') {
      return Object.keys(v).map(function(k){ var vv = v[k]; return (vv==null||vv==='')?'':(humanize(k)+': '+(typeof vv==='object'?JSON.stringify(vv):String(vv))); }).filter(Boolean).join(' · ');
    }
    return String(v);
  }
  function lastCard(title, entry){
    if (!entry || (typeof entry === 'object' && !Array.isArray(entry) && Object.keys(entry).length === 0)) {
      return '<div class="none">'+esc(title)+': none on record</div>';
    }
    var count = 0, item = entry;
    if (Array.isArray(entry)) { count = entry.length; item = entry[0] || {}; }
    if (typeof item !== 'object') item = { details: item };
    var dateVal = item.date || item.d || item.when || item.createdAt || item.created_at || item.reportedAt || '';
    var skipKeys = {date:1,d:1,when:1,createdAt:1,created_at:1,reportedAt:1};
    var rows = Object.keys(item).map(function(k){
      if (skipKeys[k]) return '';
      var v = fmtVal(item[k]);
      return v ? '<div><b>'+esc(humanize(k))+':</b> '+esc(v)+'</div>' : '';
    }).filter(Boolean).join('');
    var badge = count > 1 ? ' <span class="sub" style="font-size:11px;">('+count+' reports)</span>' : '';
    return '<div class="last"><div class="hd"><span>'+esc(title)+badge+'</span>'
      + '<span class="sub" style="font-size:12px;font-weight:600;">'+esc(fmtD(dateVal)||'')+'</span></div>'
      + '<div class="body">'+(rows || '<span class="muted">No details recorded</span>')+'</div></div>';
  }
  function statBox(n, l){
    return '<div class="stat"><div class="n">'+esc(n||'—')+'</div><div class="l">'+esc(l)+'</div></div>';
  }
  function renderInvalid(msg){
    document.getElementById('root').innerHTML =
      '<div class="wrap"><div class="card" style="text-align:center;padding:40px;">'
      + '<div style="font-size:48px;color:#b91c1c;">⚠️</div>'
      + '<h1 style="margin-top:12px;color:#0f172a;">'+esc(msg||'Invalid QR data')+'</h1>'
      + '<p style="color:#64748b;margin-top:8px;">This QR could not be resolved to a worker profile.</p>'
      + '</div></div>';
  }
  function renderLoading(msg){
    document.getElementById('root').innerHTML =
      '<div class="wrap"><div class="card" style="text-align:center;padding:40px;color:#64748b;">'
      + '<div style="font-size:32px;">⏳</div><div style="margin-top:10px;">'+esc(msg||'Loading…')+'</div>'
      + '</div></div>';
  }

  function render(s, opts){
    opts = opts || {};
    var cnt = s.cnt || {};
    var scannedAt = new Date();
    document.title = 'Emergency Info - ' + (s.n || 'Worker');

    var liveBadge = opts.live
      ? '<span class="live-badge"><span class="live-dot"></span>Live data</span>'
      : '';

    var header =
        '<div class="emg-header">'
      +   '<div><div class="lbl">Emergency Medical Info '+liveBadge+'</div><div class="nm">🚑 '+esc(s.n||'')+'</div></div>'
      +   '<div class="no-print" style="display:flex;gap:8px;">'
      +     '<button class="btn" onclick="location.reload()">🔄 Refresh</button>'
      +     '<button class="btn" onclick="window.print()">🖨️ Print</button>'
      +   '</div>'
      + '</div>';

    var identity =
        '<div class="card">'
      +   '<div class="row">'
      +     '<div class="avatar">'+esc((s.n||'?').charAt(0).toUpperCase())+'</div>'
      +     '<div style="flex:1;min-width:220px;">'
      +       '<div style="font-size:24px;font-weight:800;color:#0f172a;">'+esc(s.n||'')+'</div>'
      +       '<div class="sub" style="font-size:15px;margin-top:4px;">'+esc(s.jt||s.j||'')+(s.dp?(' · '+esc(s.dp)):'')+'</div>'
      +       (s.co ? '<div class="sub" style="font-size:14px;margin-top:2px;">🏢 '+esc(s.co)+'</div>' : '')
      +       (s.ph ? ('<a class="telbtn" href="tel:'+esc(s.ph)+'">📞 '+esc(s.ph)+'</a>') : '')
      +     '</div>'
      +   '</div>'
      +   '<div class="kv" style="margin-top:18px;">'
      +     kvItem('Worker ID', s.id)
      +     kvItem('Nationality', s.nt)
      +     kvItem('Age', s.ag)
      +     kvItem('Site / Location', s.st)
      +     kvItem('Job', s.j)
      +     kvItem('Department', s.dp)
      +   '</div>'
      + '</div>';

    var vitals =
        '<div class="card">'
      +   '<h2><span class="ico">❤️</span> Critical Medical Summary</h2>'
      +   '<div class="pills">'
      +     pill('Blood Pressure', s.bp, '#fef3c7')
      +     pill('Blood Sugar', s.bs, '#dbeafe')
      +   '</div>'
      +   '<div class="grid2" style="margin-top:14px;">'
      +     '<div>' + listBlock('⚠️ Allergies', s.al||[], 'alert-list') + '</div>'
      +     '<div>' + listBlock('🩺 Chronic Diseases', s.ch||[], 'chronic-list') + '</div>'
      +   '</div>'
      +   listBlock('💊 Current Medications', s.md||[], 'med-list')
      + '</div>';

    var lp = s.lp || s.lastPhysical || s.physical || s.exams || s.pe;
    var lc = s.lc || s.lastClinic   || s.clinic   || s.visits || s.cv;
    var li = s.li || s.lastInjury   || s.injury   || s.injuries || s.ir;
    var history =
        '<div class="card">'
      +   '<h2><span class="ico">📋</span> Medical History</h2>'
      +   '<div class="grid2">'
      +     lastCard('Last Physical Exam', lp)
      +     lastCard('Last Clinic Visit',  lc)
      +   '</div>'
      +   '<div style="margin-top:14px;">'
      +     lastCard('Last Injury Report', li)
      +   '</div>'
      +   '<div class="stats">'
      +     statBox(cnt.p!=null?String(cnt.p):(Array.isArray(lp)?String(lp.length):''), 'Physical Exams')
      +     statBox(cnt.c!=null?String(cnt.c):(Array.isArray(lc)?String(lc.length):''), 'Clinic Visits')
      +     statBox(cnt.i!=null?String(cnt.i):(Array.isArray(li)?String(li.length):''), 'Injuries')
      +     statBox(fmtD(s.lme), 'Last Exam')
      +     statBox(fmtD(s.lcv), 'Last Visit')
      +     statBox(fmtD(s.lid), 'Last Injury')
      +   '</div>'
      + '</div>';

    var footer =
        '<div class="foot">'
      +   '🕒 Scanned: <b>'+esc(fmtDT(scannedAt))+'</b>'
      +   (opts.live ? ' · Fetched live from database' : (s.g   ? ' · QR generated: <b>'+esc(fmtDT(s.g))+'</b>' : ''))
      +   (s.upd ? ' · Records updated: <b>'+esc(fmtDT(s.upd))+'</b>' : '')
      + '</div>';

    document.getElementById('root').innerHTML =
      header + '<div class="wrap">' + identity + vitals + history + footer + '</div>';
  }

  /* ============ Live snapshot builder (mirrors the main app) ============ */
  function truncate(s, n){ s = String(s||''); return s.length>n ? s.slice(0,n-1)+'…' : s; }
  function pickV(o, keys){ for (var i=0;i<keys.length;i++){ var k=keys[i]; if (o && o[k]!=null && String(o[k]).trim()!=='') return String(o[k]).trim(); } return ''; }
  function toArray(x){ if (!x) return []; if (Array.isArray(x)) return x; if (typeof x==='object') return Object.keys(x).map(function(k){ return x[k]; }); return []; }

  function extractCritical(records){
    var chronic = new Set(), allergies = new Set(), meds = new Set();
    var chronicKeys = ['chronicDiseases','chronic_disease','chronic','pastMedicalHistory','pmh','medicalHistory','conditions'];
    var allergyKeys = ['allergies','allergy','knownAllergies','drugAllergies'];
    var medKeys = ['medications','currentMedications','regularMedications','medication','drugs','prescription','currentMeds'];
    var splitAdd = function(set, val){
      if (!val) return;
      String(val).split(/[,;\n\|\/]+/).forEach(function(x){
        x = x.trim();
        if (x && !/^(none|no|nil|n\/a|na|--|-)$/i.test(x)) set.add(x);
      });
    };
    records.forEach(function(r){
      var d = (r && r.data) ? r.data : (r||{});
      chronicKeys.forEach(function(k){ if (d[k]) splitAdd(chronic, d[k]); });
      allergyKeys.forEach(function(k){ if (d[k]) splitAdd(allergies, d[k]); });
      medKeys.forEach(function(k){ if (d[k]) splitAdd(meds, d[k]); });
    });
    return { chronic: Array.from(chronic), allergies: Array.from(allergies), medications: Array.from(meds) };
  }

  function shrink(entry, fieldMap){
    if (!entry) return null;
    var d = entry.data || entry || {};
    var out = { date: entry.date || d.date || d.visitDate || d.injuryDate || '' };
    Object.keys(fieldMap).forEach(function(k){
      var v = pickV(d, fieldMap[k]);
      if (v) out[k] = truncate(v, 120);
    });
    return out;
  }

  function buildLiveSnapshot(worker, phys, clinic, inj){
    var crit = extractCritical(phys.concat(clinic));
    var bloodType = '';
    phys.concat(clinic).forEach(function(r){
      var d = (r && r.data) || {};
      var bt = pickV(d, ['bloodType','bloodGroup','blood_group']);
      if (bt && !bloodType) bloodType = bt;
    });
    var dateOf = function(e){ return e ? (e.date || (e.data&&(e.data.date||e.data.visitDate||e.data.injuryDate)) || '') : ''; };
    var lastOf = function(arr){
      if (!arr.length) return null;
      return arr.slice().sort(function(a,b){
        return new Date(dateOf(b)||0).getTime() - new Date(dateOf(a)||0).getTime();
      })[0];
    };
    var lastPhys = lastOf(phys), lastClin = lastOf(clinic), lastInj = lastOf(inj);
    var bp='', bs='';
    var cand = phys.concat(clinic).slice().sort(function(a,b){ return new Date(dateOf(b)||0).getTime() - new Date(dateOf(a)||0).getTime(); });
    for (var i=0;i<cand.length;i++){
      var d=(cand[i]&&cand[i].data)||{};
      if (!bp){
        var v = pickV(d, ['blood_pressure','bloodPressure','bp']);
        if (!v){
          var sys = pickV(d, ['bp_systolic','systolic']);
          var dia = pickV(d, ['bp_diastolic','diastolic']);
          if (sys && dia) v = sys+'/'+dia;
        }
        if (v) bp = v;
      }
      if (!bs){
        var v2 = pickV(d, ['rbg','blood_sugar','bloodSugar','glucose','randomBloodSugar']);
        if (v2) bs = v2;
      }
      if (bp && bs) break;
    }
    var allDates = phys.concat(clinic, inj).map(dateOf).filter(Boolean).map(function(x){ return new Date(x).getTime(); }).filter(function(t){ return !isNaN(t); });
    var updated = allDates.length ? new Date(Math.max.apply(null, allDates)).toISOString() : '';
    var fitness = lastPhys ? pickV((lastPhys.data||{}), ['fitnessStatus','status','fitnessResult','result']) : '';

    return {
      v:3, t:'eprof',
      n: worker.name||'', id: worker.id||'', nid: worker.nationalId||worker.id||'',
      co: worker.company||'',
      j: worker.role||worker.job||'',
      jt: worker.jobTitle||worker.role||worker.job||'',
      dp: worker.department||'',
      ag: worker.age||'', nt: worker.nationality||'', ph: worker.phone||'',
      st: worker.site||worker.location||worker.projectSite||worker.project||worker.projectName||worker.workSite||worker.workLocation||'',
      bt: bloodType, mfs: fitness, bp: bp, bs: bs,
      lme: dateOf(lastPhys), lcv: dateOf(lastClin), lid: dateOf(lastInj),
      al: crit.allergies.slice(0,10),
      ch: crit.chronic.slice(0,10),
      md: crit.medications.slice(0,10),
      lp: shrink(lastPhys, {
        result:['result','examResult','fitnessResult','fitnessStatus'],
        status:['status','fitnessStatus','medicalStatus'],
        doctor:['doctor','physician','examinedBy','doctorName'],
        clinic:['clinic','hospital','medicalCenter','facility'],
        examType:['examType','type','category'],
        weight:['weight'], height:['height'], bmi:['bmi'],
        bp:['blood_pressure','bloodPressure','bp'],
        bs:['rbg','blood_sugar','bloodSugar','glucose','randomBloodSugar'],
        hr:['heart_rate','heartRate','pulse'],
        temp:['temperature','temp'],
        vision:['vision','eyeSight','visualAcuity'],
        recommendations:['recommendations','recommendation','advice'],
        notes:['notes','remarks','comment','comments']
      }),
      lc: shrink(lastClin, {
        complaint:['complaint','chiefComplaint','presentComplaint','symptoms'],
        diagnosis:['diagnosis','impression','assessment'],
        treatment:['treatment','plan','managementPlan'],
        medication:['medication','medications','prescription','drugs'],
        doctor:['doctor','physician','doctorName','attendedBy'],
        clinic:['clinic','hospital','medicalCenter','facility'],
        bp:['blood_pressure','bloodPressure','bp'],
        bs:['rbg','blood_sugar','bloodSugar','glucose'],
        temp:['temperature','temp'],
        followup:['followup','follow_up','followUp','nextVisit'],
        outcome:['outcome','result','disposition'],
        notes:['notes','remarks','comment','comments']
      }),
      li: shrink(lastInj, {
        reportId:['report_ref_no','reportId','id','ref','refNo','reportNumber'],
        reportDate:['report_date','date','injuryDate','incidentDate'],
        injuryKind:['injury_kind','injuryType','type','natureOfInjury'],
        cause:['cause','rootCause','mechanism'],
        bodyParts:['body_parts_selected','bodyPart','injuryLocation','part'],
        description:['injury_details','description','howHappened','details','narrative'],
        severity:['severity','grade','level'],
        firstAid:['firstaid','first_aid','firstAid'],
        treatment:['treatment_action','treatment','medicalTreatment','management'],
        referral:['referral','referred','refer'],
        referredHospital:['referred_hospital','refer_hospital','hospital'],
        status:['status_ip','status','disposition'],
        outcome:['outcome','result'],
        clinicalNotes:['clinical_notes','clinicalNotes','notes','remarks']
      }),
      cnt: { p: phys.length, c: clinic.length, i: inj.length },
      upd: updated
    };
  }

  function loadFromFirebase(workerId){
    renderLoading('Fetching latest records for worker ' + workerId + '…');
    if (typeof firebase === 'undefined' || !firebase.database){
      renderInvalid('Firebase SDK failed to load. Check your internet connection.');
      return;
    }
    var db = firebase.database();
    db.ref('medicalRecords').get().then(function(snap){
      if (!snap.exists()){ renderInvalid('No medical records in database'); return; }
      var data = snap.val() || {};
      var workers = data.workers || [];
      if (!Array.isArray(workers)) workers = Object.keys(workers).map(function(k){ return workers[k]; });
      var worker = null;
      for (var i=0;i<workers.length;i++){
        if (workers[i] && String(workers[i].id) === String(workerId)){ worker = workers[i]; break; }
      }
      if (!worker){ renderInvalid('Worker ' + workerId + ' not found'); return; }
      var phys   = toArray((data.physicalReports || {})[workerId]);
      var clinic = toArray((data.clinicReports   || {})[workerId]);
      var inj    = toArray((data.injuryReports   || {})[workerId]);
      var s = buildLiveSnapshot(worker, phys, clinic, inj);
      render(s, { live: true });
    }).catch(function(err){
      console.error('Firebase read failed:', err);
      renderInvalid('Could not fetch latest data: ' + (err && err.message ? err.message : 'unknown error'));
    });
  }

  function renderLogin(pendingHash, errMsg){
    document.getElementById('root').innerHTML =
      '<div class="wrap" style="justify-content:center;align-items:center;"><div class="card" style="padding:28px;width:100%;max-width:440px;margin:auto;">'
      + '<div style="text-align:center;font-size:40px;">🔒</div>'
      + '<h1 style="text-align:center;font-size:20px;margin-top:8px;color:#0f172a;">Authorized Access Only</h1>'
      + '<p style="text-align:center;color:#64748b;font-size:13px;margin-top:6px;">Sign in with your medical staff account to view worker emergency info.</p>'
      + (errMsg ? '<div style="background:#fee2e2;color:#991b1b;padding:10px 12px;border-radius:8px;margin-top:14px;font-size:13px;font-weight:600;">'+esc(errMsg)+'</div>' : '')
      + '<form id="lf" style="margin-top:16px;display:flex;flex-direction:column;gap:10px;">'
      + '  <label style="font-size:12px;font-weight:700;color:#334155;">Email'
      + '    <input id="le" type="email" required autocomplete="username" style="width:100%;margin-top:4px;padding:10px 12px;border:1px solid #cbd5e1;border-radius:8px;font-size:14px;">'
      + '  </label>'
      + '  <label style="font-size:12px;font-weight:700;color:#334155;">Password'
      + '    <input id="lp" type="password" required autocomplete="current-password" style="width:100%;margin-top:4px;padding:10px 12px;border:1px solid #cbd5e1;border-radius:8px;font-size:14px;">'
      + '  </label>'
      + '  <button type="submit" id="lb" style="margin-top:6px;background:#dc2626;color:#fff;border:0;padding:12px;border-radius:8px;font-weight:800;font-size:15px;cursor:pointer;">Sign in</button>'
      + '</form>'
      + '</div></div>';
    document.getElementById('lf').addEventListener('submit', function(ev){
      ev.preventDefault();
      var em = document.getElementById('le').value.trim();
      var pw = document.getElementById('lp').value;
      var btn = document.getElementById('lb');
      btn.disabled = true; btn.textContent = 'Signing in…';
      firebase.auth().signInWithEmailAndPassword(em, pw)
        .then(function(){ /* onAuthStateChanged will re-boot */ })
        .catch(function(err){
          var msg = 'Sign-in failed';
          if (err && err.code === 'auth/invalid-credential') msg = 'Invalid email or password';
          else if (err && err.code === 'auth/too-many-requests') msg = 'Too many attempts. Try again later.';
          else if (err && err.message) msg = err.message;
          renderLogin(pendingHash, msg);
        });
    });
  }

  function handleHash(){
    var h = location.hash || '';
    var mw = h.match(/^#w=(.+)$/);
    if (mw){
      var wid = '';
      try { wid = decodeURIComponent(mw[1]); } catch(_) { wid = mw[1]; }
      loadFromFirebase(wid);
      return;
    }
    var me = h.match(/^#e=(.+)$/);
    if (me){
      var data = fromB64Url(me[1]);
      if (!data){ renderInvalid('Invalid QR data'); return; }
      render(data, { live: false });
      return;
    }
    renderInvalid('No worker in link');
  }

  function boot(){
    try { firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL); } catch(_){}
    firebase.auth().onAuthStateChanged(function(user){
      if (user) handleHash();
      else renderLogin(location.hash || '');
    });
  }
  window.addEventListener('hashchange', function(){
    if (firebase.auth().currentUser) handleHash();
  });
  boot();
})();
</script>
