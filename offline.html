<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline | Construction Medical Records</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:#f0f4f8;color:#1e293b;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.box{max-width:460px;background:#fff;border-radius:20px;padding:36px 28px;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,.08)}
.ic{width:80px;height:80px;border-radius:50%;background:#0f4c75;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:38px;margin-bottom:18px}
h1{font-size:22px;color:#0f4c75;margin-bottom:10px}
p{color:#64748b;line-height:1.6;margin-bottom:20px}
button{background:#0f4c75;color:#fff;border:0;padding:12px 26px;border-radius:10px;font-weight:700;cursor:pointer;font-size:15px}
button:hover{background:#3282b8}
</style>
</head>
<body>
<div class="box">
<div class="ic">📶</div>
<h1>You're offline</h1>
<p>No internet connection detected. Please check your connection and try again. Cached pages will still open.</p>
<button onclick="location.reload()">Retry</button>
</div>
</body>
</html>
